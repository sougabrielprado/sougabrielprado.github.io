        body {

            flex-direction: column;

        /* Container otimizado para mobile (iPhone 12) */
        .hub-container {
            width: 100%;

            text-align: center;

        /* Logo e Branding */

        h2 {

            color: #D4AF37; /* Ouro Alquímico */
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        /* Botões Primários (Contato C-Level) */
        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background-color: #D4AF37;
            color: #112236;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }

        .btn-primary i {
            margin-right: 10px;
            font-size: 18px;
        }

        .btn-primary:active {
            transform: scale(0.98);
            background-color: #b5952f;
        }

        /* Linha Divisória de Ouro */
        .divider {
            width: 100%;
            height: 1px;
            background: rgba(212, 175, 55, 0.3);
            margin: 30px 0;
            position: relative;
        }
        
        .divider::after {
            content: 'ECOSSISTEMA DIGITAL';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #112236;
            padding: 0 15px;
            font-size: 10px;
            color: #D4AF37;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Botões Secundários (Redes Sociais OSINT) */
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;

            background-color: transparent;
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 400;
            font-size: 14px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .btn-social i {
            margin-right: 12px;
            color: #D4AF37;
            font-size: 18px;
        }

        .btn-social:active {
            background-color: rgba(212, 175, 55, 0.1);
            border-color: #D4AF37;
        }

        /* Rodapé Institucional */
        .footer {
            margin-top: 45px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.6;
