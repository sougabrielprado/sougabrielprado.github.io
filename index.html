    <title>Gabriel Prado | Estrategista de Marketing</title>

    <style>
        :root {
            --navy: #0a192f;
            --gold: #d4af37;
            --white: #e6f1ff;
            --slate: #8892b0;
        }
        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border: 1px solid var(--gold);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { color: var(--slate); font-size: 1.2rem; font-weight: 400; margin-top: 0; }
        .meta { 
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            display: inline-block;
            margin: 1.5rem 0;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .projects { text-align: left; margin: 2rem 0; }
        .project-item { margin-bottom: 1rem; border-left: 2px solid var(--gold); padding-left: 1rem; }
        .project-item b { color: var(--gold); }
        .links { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; }
        .btn {
            text-decoration: none;
            color: var(--navy);
            background-color: var(--gold);
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: var(--white); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gabriel Prado</h1>

        <div class="meta">🎯 META: 70K EM 40 DIAS</div>

            <div class="project-item"><b>⌛ Chronos Elite:</b> AI Business Integration</div>
        </div>
